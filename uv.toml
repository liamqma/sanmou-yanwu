# Pin the package index to the public PyPI for this open-source repo.
#
# Why this file exists:
#   A corporate-issued workstation's `~/.config/uv/uv.toml` typically points
#   at a private artifactory mirror with embedded credentials. Without a
#   workspace-level override, that URL leaks into `uv.lock` and any subsequent
#   commit pushes private credentials + the internal mirror URL onto a public
#   GitHub repo. This file ensures every `uv` invocation anywhere in this
#   repo resolves against the public PyPI registry.
#
# Precedence (uv docs): workspace `uv.toml` overrides user `~/.config/uv/uv.toml`.
[[index]]
url = "https://pypi.org/simple"
default = true
