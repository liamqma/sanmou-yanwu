<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scene 4 · 结果与推荐</title>
<link rel="stylesheet" href="theme.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="nav.js"></script>
<style>
  .stage {
    height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; padding: 11vh 5vw 6vh; gap: 3vh;
  }
  .lead {
    font-family: var(--serif); font-size: 1.3rem; color: var(--ink);
    text-align: center; opacity: 0; max-width: 62rem;
  }
  /* hero result cards */
  .cards { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .rcard {
    width: 21rem; background: var(--paper-light); border: 1px solid var(--rule);
    border-radius: 8px; box-shadow: 0 12px 34px rgba(44,41,30,.08);
    padding: 2.2vh 1.6vw; opacity: 0; transform: translateY(18px);
  }
  .rcard .top { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.4vh; }
  .rcard img { width: 3.6rem; height: 3.6rem; border-radius: 6px; object-fit: cover; object-position: top center; border: 1px solid var(--rule); }
  .rcard .name { font-family: var(--serif); font-size: 1.35rem; font-weight: 700; }
  .rcard .tagline { font-size: .82rem; color: var(--ink-soft); }
  .metric { display: flex; justify-content: space-between; align-items: baseline; padding: .5vh 0; border-top: 1px dashed var(--rule); }
  .metric .k { color: var(--ink-soft); font-size: .95rem; }
  .metric .v { font-family: var(--mono); font-weight: 800; font-size: 1.3rem; }
  .v.pos { color: var(--jade-dark); }
  .v.neg { color: var(--seal); }
  .rcard .note { margin-top: 1.2vh; font-size: .9rem; color: var(--ink); line-height: 1.5; opacity: 0; }
  .rcard .note b { color: var(--seal-dark); }

  /* recommendation screenshot */
  .reco { width: 100%; max-width: 74rem; text-align: center; opacity: 0; }
  .reco .cap {
    font-family: var(--serif); font-size: 1.2rem; color: var(--jade-dark); margin-bottom: 1.4vh;
  }
  .reco img {
    width: 100%; border-radius: 8px; border: 1px solid var(--rule);
    box-shadow: 0 16px 40px rgba(44,41,30,.14);
  }
  .reco .sub { margin-top: 1.2vh; font-size: 1rem; color: var(--ink-soft); }
  .reco .sub b { color: var(--gold-ink); }
</style>
</head>
<body>
  <div class="scene-title" id="title">
    <span class="seal-badge">肆</span>
    <span class="zh">结果与推荐</span><span class="en">STRENGTH &amp; RECOMMENDATION</span>
  </div>

  <div class="stage">
    <div class="lead" id="lead">最后我们得到了结果——每个武将、每种搭配，都有了一个「强度加成」</div>

    <div class="cards" id="cards">
      <!-- 姜维: healthy positive -->
      <div class="rcard" id="card1">
        <div class="top">
          <img src="" id="img1" /><div>
            <div class="name">姜维</div>
            <div class="tagline">正数 · 在场能提升胜率</div>
          </div>
        </div>
        <div class="metric"><span class="k">强度加成</span><span class="v pos" id="v1">+0.24</span></div>
        <div class="metric"><span class="k">参考场次</span><span class="v" id="s1" style="color:var(--ink-soft)">707</span></div>
      </div>

      <!-- 孟获: high win-rate but NEGATIVE strength -->
      <div class="rcard" id="card2">
        <div class="top">
          <img src="" id="img2" /><div>
            <div class="name">孟获</div>
            <div class="tagline">胜率高，强度却是负的？</div>
          </div>
        </div>
        <div class="metric"><span class="k">胜率参考</span><span class="v" id="w2" style="color:var(--jade-dark)">63%</span></div>
        <div class="metric"><span class="k">强度加成</span><span class="v neg" id="v2">−0.52</span></div>
        <div class="note" id="note2">胜率高，是因为他常和强力队友同队；<br/>单看他自己，其实<b>拖了后腿</b>——价值全在搭配里。</div>
      </div>
    </div>

    <!-- recommendation screenshot: strength -> ranked teams -->
    <div class="reco" id="reco">
      <div class="cap">把每个「强度加成」加起来，就能给整支队伍评分、排序、并推荐</div>
      <img src="assets/recommend.png" alt="推荐结果" />
      <div class="sub">评分最高的一组，就是 <b>★ AI 推荐</b>；每一项加分都能看到，透明可解释。</div>
    </div>
  </div>

  <div class="hint">按 <kbd>空格</kbd> / <kbd>→</kbd> 继续 · <kbd>←</kbd> 上一幕 · <kbd>R</kbd> 重播</div>

<script src="heroes.js"></script>
<script>
document.getElementById("img1").src = heroImg("姜维");
document.getElementById("img2").src = heroImg("孟获");

gsap.set(".rcard", { opacity: 0, y: 18 });
gsap.set("#note2,#reco", { opacity: 0 });

const beats = [];

// 0: title + lead
beats.push(() => {
  const tl = gsap.timeline();
  tl.to("#title", { opacity: 1, duration: .5 })
    .to("#lead", { opacity: 1, duration: .5 }, "-=.2");
  return tl;
});

// 1: 姜维 card (the clean positive result)
beats.push(() => gsap.to("#card1", { opacity: 1, y: 0, duration: .5, ease: "power3.out" }));

// 2: 孟获 card + the "win-rate != strength" note
beats.push(() => {
  const tl = gsap.timeline();
  tl.to("#card2", { opacity: 1, y: 0, duration: .5, ease: "power3.out" })
    .fromTo("#v2", { scale: 1 }, { scale: 1.3, duration: .35, yoyo: true, repeat: 1 }, "-=.1")
    .to("#note2", { opacity: 1, duration: .6 }, "+=.15");
  return tl;
});

// 3: recommendation screenshot (strength -> ranked teams + AI 推荐)
beats.push(() => {
  const tl = gsap.timeline();
  // shrink the two cards up a touch to make room, then reveal the screenshot
  tl.to("#lead", { opacity: 0, duration: .3 })
    .to("#cards", { scale: .82, opacity: .85, duration: .5, ease: "power2.inOut" }, "<")
    .to("#reco", { opacity: 1, y: 0, duration: .7, ease: "power3.out" }, "-=.2");
  return tl;
});

function reset() {
  gsap.set("#title,#lead,#note2,#reco", { opacity: 0 });
  gsap.set("#cards", { scale: 1, opacity: 1 });
  gsap.set(".rcard", { opacity: 0, y: 18 });
}
SceneNav.init({ beats, reset });
</script>
</body>
</html>
