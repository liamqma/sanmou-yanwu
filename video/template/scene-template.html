<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scene N · 场景标题</title>
<link rel="stylesheet" href="theme.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="nav.js"></script>
<style>
  /* --- scene-specific layout goes here --- */
  .stage {
    height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; padding: 11vh 6vw 6vh; gap: 3vh;
  }
  .lead {
    font-family: var(--serif); font-size: 1.3rem; color: var(--ink);
    text-align: center; opacity: 0; max-width: 60rem;
  }
</style>
</head>
<body>
  <!-- Scene tag: seal badge (壹/贰/叁…) + Chinese + English label -->
  <div class="scene-title" id="title">
    <span class="seal-badge">壹</span>
    <span class="zh">场景标题</span><span class="en">SCENE TITLE</span>
  </div>

  <div class="stage">
    <div class="lead" id="lead">这里是本幕的引导文案</div>
    <!-- add your content elements here -->
  </div>

  <!-- Standard keyboard hint bar -->
  <div class="hint">按 <kbd>空格</kbd> / <kbd>→</kbd> 继续 · <kbd>←</kbd> 上一幕 · <kbd>R</kbd> 重播</div>

<script>
/*
 * The scene pattern:
 *   1. Set the initial (hidden) state with gsap.set(...).
 *   2. Push one function per "beat" into `beats`. Each returns a gsap timeline
 *      (or tween). Beats advance on Space / -> ; the FIRST beat auto-runs.
 *   3. Define reset() to restore the initial state (used by R and back-nav).
 *   4. Call SceneNav.init({ beats, reset }) — order/total come from scenes.json.
 */

gsap.set("#lead", { opacity: 0 });

const beats = [];

// beat 0: title + lead in
beats.push(() => {
  const tl = gsap.timeline();
  tl.to("#title", { opacity: 1, duration: .5 })
    .to("#lead", { opacity: 1, duration: .5 }, "-=.2");
  return tl;
});

// beat 1: (example) — add more beats here
// beats.push(() => gsap.to("#something", { opacity: 1, y: 0, duration: .5 }));

function reset() {
  gsap.set("#title,#lead", { opacity: 0 });
  // reset any other elements/counters to their initial state here
}

SceneNav.init({ beats, reset });
</script>
</body>
</html>
