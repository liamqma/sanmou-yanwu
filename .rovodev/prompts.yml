prompts:
  - name: improve-tips
    description: "Analyse the recent conversation and propose updates to web/src/tips.json based on insights about heroes, skills, team compositions, and general game mechanics."
    content_file: improve-tips.md
  - name: learn-from-video
    description: "Take a video URL (Bilibili / Douyin / YouTube / ...), use ./learn to download + transcribe it, cross-reference web/src/database.json, propose tips.json updates for review, then merge once the user confirms."
    content_file: learn-from-video.md
  - name: game-detail-look
    description: "Re-check the previous compact game recommendation using omitted verbose database details such as hero/skill descriptions, relevant states, and bonds."
    content_file: skills/game-detail-lookup/SKILL.md
  - name: update-game-database-from-csv
    description: "Update web/src/database.json from the three 炎帝/UCL_Louis CSV source files, using curated aliases and existing database fields only."
    content_file: skills/update-game-database-from-csv/SKILL.md
  - name: team-damage
    description: "Analyse a fixed 3-hero squad's 增伤/减伤 per hero using web/src/database.json (stats/skills/bonds) and research/公式.md (damage formula), accounting for formation, max-level values, '最高单体' routing, and 区间A/B/C stacking rules."
    content_file: skills/team-damage-analysis/SKILL.md
