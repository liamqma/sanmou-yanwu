name: Update telemetry data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      reset_checkpoint:
        description: Explicitly discard cumulative telemetry history
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-telemetry-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require the master workflow ref
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/master" ]]; then
            echo "Telemetry retention may run only from master" >&2
            exit 1
          fi

      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          persist-credentials: false

      - name: Record checked-out master revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.16.0
          run_install: false

      - name: Test telemetry builder
        run: |
          python -m unittest \
            data/test_build_telemetry_data.py \
            data/test_telemetry_incremental_state.py \
            data/test_telemetry_observation_report.py \
            data/test_telemetry_retention.py \
            -v

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository variable" >&2; exit 1; }
          test -n "$CLOUDFLARE_D1_DATABASE_NAME" || { echo "Missing CLOUDFLARE_D1_DATABASE_NAME repository variable" >&2; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN secret" >&2; exit 1; }
          [[ "$CLOUDFLARE_ACCOUNT_ID" =~ ^[0-9a-fA-F]{32}$ ]] || { echo "Invalid CLOUDFLARE_ACCOUNT_ID repository variable" >&2; exit 1; }
          if [[ "$CLOUDFLARE_D1_DATABASE_NAME" == -* || \
                "$CLOUDFLARE_D1_DATABASE_NAME" == *$'\n'* || \
                "$CLOUDFLARE_D1_DATABASE_NAME" == *$'\r'* ]]; then
            echo "Invalid CLOUDFLARE_D1_DATABASE_NAME repository variable" >&2
            exit 1
          fi

      - name: Capture pre-migration D1 metadata
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm dlx wrangler@4.112.0 d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --command="SELECT (SELECT sql FROM sqlite_master WHERE type = 'table' AND name = 'round_telemetry') AS table_sql, COUNT(*) AS row_count, MIN(id) AS min_id, MAX(id) AS max_id FROM round_telemetry" \
            --json > "$RUNNER_TEMP/d1-pre-migration.json"

      - name: Validate D1 migration preflight
        id: retention_preflight
        env:
          RESET_CHECKPOINT: ${{ inputs.reset_checkpoint == true && 'true' || 'false' }}
        run: |
          reset_args=()
          case "$RESET_CHECKPOINT" in
            true) reset_args+=(--reset-checkpoint) ;;
            false) ;;
            *)
              echo "Invalid reset_checkpoint input" >&2
              exit 1
              ;;
          esac
          python data/telemetry_retention.py preflight \
            "$RUNNER_TEMP/d1-pre-migration.json" \
            data/telemetry_state.json \
            --github-output "$GITHUB_OUTPUT" \
            "${reset_args[@]}"

      - name: Apply required D1 AUTOINCREMENT migration
        if: steps.retention_preflight.outputs.migration_required == 'true'
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm dlx wrangler@4.112.0 d1 execute \
            "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --file=migrations/0002_round_telemetry_autoincrement.sql \
            --yes

      - name: Capture post-migration D1 metadata
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm dlx wrangler@4.112.0 d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --command="SELECT (SELECT sql FROM sqlite_master WHERE type = 'table' AND name = 'round_telemetry') AS table_sql, COUNT(*) AS row_count, MIN(id) AS min_id, MAX(id) AS max_id, COALESCE((SELECT seq FROM sqlite_sequence WHERE name = 'round_telemetry'), 0) AS sequence_value FROM round_telemetry" \
            --json > "$RUNNER_TEMP/d1-post-migration.json"

      - name: Verify D1 migration and sequence
        env:
          RESET_CHECKPOINT: ${{ inputs.reset_checkpoint == true && 'true' || 'false' }}
        run: |
          reset_args=()
          case "$RESET_CHECKPOINT" in
            true) reset_args+=(--reset-checkpoint) ;;
            false) ;;
            *)
              echo "Invalid reset_checkpoint input" >&2
              exit 1
              ;;
          esac
          python data/telemetry_retention.py verify \
            "$RUNNER_TEMP/d1-pre-migration.json" \
            "$RUNNER_TEMP/d1-post-migration.json" \
            data/telemetry_state.json \
            "${reset_args[@]}"

      - name: Collect D1 observation data
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm dlx wrangler@4.112.0 d1 info "$CLOUDFLARE_D1_DATABASE_NAME" \
            --json > "$RUNNER_TEMP/d1-info.json"
          pnpm dlx wrangler@4.112.0 d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --command="SELECT COUNT(*) AS older_than_14_days_count FROM round_telemetry WHERE received_at < datetime('now', '-14 days')" \
            --json > "$RUNNER_TEMP/d1-retention.json"

      - name: Report D1 observation data
        run: |
          python data/telemetry_observation_report.py \
            "$RUNNER_TEMP/d1-info.json" \
            "$RUNNER_TEMP/d1-retention.json" \
            "$GITHUB_STEP_SUMMARY"

      - name: Export round telemetry from D1
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          umask 077
          pnpm dlx wrangler@4.112.0 d1 export "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --table=round_telemetry \
            --output="$RUNNER_TEMP/round_telemetry.sql" \
            --skip-confirmation
          [[ "$(stat -c '%a' "$RUNNER_TEMP/round_telemetry.sql")" == "600" ]] || {
            echo "Telemetry export permissions are not owner-only" >&2
            exit 1
          }

      - name: Build public artifact and incremental checkpoint
        env:
          RESET_CHECKPOINT: ${{ inputs.reset_checkpoint == true && 'true' || 'false' }}
        run: |
          trap 'rm -f -- "$RUNNER_TEMP/round_telemetry.sql"' EXIT
          reset_args=()
          case "$RESET_CHECKPOINT" in
            true) reset_args+=(--reset-state) ;;
            false) ;;
            *)
              echo "Invalid reset_checkpoint input" >&2
              exit 1
              ;;
          esac
          python data/build_telemetry_data.py \
            "$RUNNER_TEMP/round_telemetry.sql" \
            --state data/telemetry_state.json \
            --output web/public/game-data/telemetry_data.json \
            "${reset_args[@]}"
          rm -f -- "$RUNNER_TEMP/round_telemetry.sql"
          trap - EXIT
          PYTHONPATH=data python - <<'PY'
          import json
          from pathlib import Path

          from build_telemetry_data import validate_artifact
          from telemetry_incremental_state import (
              validate_state,
              validate_state_matches_artifact,
          )

          artifact = json.loads(
              Path("web/public/game-data/telemetry_data.json").read_text(
                  encoding="utf-8"
              )
          )
          state = json.loads(
              Path("data/telemetry_state.json").read_text(encoding="utf-8")
          )
          validate_artifact(artifact)
          validate_state(state, artifact["catalog_version"])
          validate_state_matches_artifact(state, artifact)
          PY
          git diff --check

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Validate Phase 3 web consumer
        working-directory: web
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish checkpoint and artifact to unchanged master
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          CHECKOUT_SHA: ${{ steps.source.outputs.sha }}
        run: |
          changed=false
          if [[ -n "$(git status --porcelain -- \
            data/telemetry_state.json \
            web/public/game-data/telemetry_data.json)" ]]; then
            changed=true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- \
              data/telemetry_state.json \
              web/public/game-data/telemetry_data.json
            mapfile -t staged_files < <(git diff --cached --name-only)
            if (( ${#staged_files[@]} == 0 )); then
              echo "Expected a telemetry checkpoint or artifact change" >&2
              exit 1
            fi
            for staged_file in "${staged_files[@]}"; do
              case "$staged_file" in
                data/telemetry_state.json|web/public/game-data/telemetry_data.json) ;;
                *)
                  echo "Refusing to commit unexpected path: $staged_file" >&2
                  exit 1
                  ;;
              esac
            done
            git commit -m "chore(telemetry): refresh weekly data"
          else
            echo "Telemetry checkpoint and artifact are unchanged"
          fi
          gh auth setup-git
          git fetch --no-tags origin \
            refs/heads/master:refs/remotes/origin/master
          remote_sha="$(git rev-parse refs/remotes/origin/master)"
          if [[ "$remote_sha" != "$CHECKOUT_SHA" ]]; then
            echo "master changed during this run; rerun to rebuild from $remote_sha" >&2
            exit 1
          fi
          if [[ "$changed" == "true" ]]; then
            git push origin HEAD:master
          fi
          published_sha="$(git rev-parse HEAD)"
          git show \
            "${published_sha}:data/telemetry_state.json" \
            > "$RUNNER_TEMP/committed-telemetry-state.json"
          echo "checkpoint_sha=$published_sha" >> "$GITHUB_OUTPUT"

      - name: Prepare bounded purge from the committed checkpoint
        run: |
          python data/telemetry_retention.py write-purge \
            "$RUNNER_TEMP/committed-telemetry-state.json" \
            "$RUNNER_TEMP/purge-round-telemetry.sql"

      - name: Purge one bounded batch of committed old rows
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          purge_sql="$(< "$RUNNER_TEMP/purge-round-telemetry.sql")"
          pnpm dlx wrangler@4.112.0 d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --command="$purge_sql" \
            --yes \
            --json > "$RUNNER_TEMP/d1-delete.json"
          pnpm dlx wrangler@4.112.0 d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" \
            --remote \
            --command="SELECT COUNT(*) AS remaining_old_row_count FROM round_telemetry WHERE received_at < datetime('now', '-14 days')" \
            --json > "$RUNNER_TEMP/d1-retention-after.json"

      - name: Report aggregate rows deleted
        run: |
          python data/telemetry_retention.py report-delete \
            "$RUNNER_TEMP/d1-delete.json" \
            "$GITHUB_STEP_SUMMARY" \
            --remaining "$RUNNER_TEMP/d1-retention-after.json"
